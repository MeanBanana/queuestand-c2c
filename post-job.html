<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Post A Queue Job | QueueStand</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <script src="js/navbar.js"></script>

    <main>
      <h1>Post a Queue Job</h1>

      <form>
        <div>
          <label>Queue Location / Service</label><br />
          <input
            type="text"
            placeholder="e.g Home Affairs Johannesburg"
          /><br />
        </div>

        <div>
          <label>Date & Time Needed</label><br />
          <input type="datetime-local" /><br />
        </div>

        <div>
          <label>Your Location (Suburb/City)</label><br />
          <input type="text" placeholder="e.g Sandton" /><br />
        </div>

        <div>
          <label>Offer Price (ZAR)</label><br />
          <input type="number" min="50" placeholder="e.g 150" /><br />
        </div>

        <div>
          <label>Additional Details</label><br />
          <textarea rows="6" placeholder="Documents needed"></textarea><br />
        </div>

        <div>
          <button type="submit">Post Job & Pay Deposit</button>
        </div>
      </form>
    </main>

    <script src="js/footer.js"></script>
  </body>
</html>
